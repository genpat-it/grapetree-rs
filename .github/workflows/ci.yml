name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: fmt · clippy · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit + property tests
        run: cargo test --release

      - name: Release build
        run: cargo build --release

      # Smoke test: the binary runs and emits a NEWICK on the bundled example.
      - name: CLI smoke test
        run: |
          ./target/release/grapetree -p tests/data/tiny.profile -m MSTreeV2 | grep -q ';'
          ./target/release/grapetree -p tests/data/tiny.profile -m distance | head -1
